<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Auth & Products</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #f9f9f9; }
        input { display: block; width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; margin-bottom: 10px; }
        .product-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .product-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="app">
        <h1>TP Authentification Simple</h1>

        <!-- Section Connexion -->
        <div v-if="!token" class="card">
            <h2>Connexion</h2>
            <div v-if="error" class="error">{{ error }}</div>
            <input v-model="loginData.email" type="email" placeholder="Email (ex: user1@example.com)">
            <input v-model="loginData.password" type="password" placeholder="Mot de passe (ex: password123)">
            <button @click="login">Se connecter</button>
        </div>

        <!-- Section Produits (Affichée si connecté) -->
        <div v-else>
            <div class="card">
                <p>Connecté en tant que : <strong>{{ loginData.email }}</strong></p>
                <button @click="logout" style="background: #dc3545;">Déconnexion</button>
            </div>

            <div class="card">
                <h2>Liste des Produits</h2>
                <button @click="fetchProducts">Actualiser les produits</button>
                <div v-if="products.length > 0">
                    <div v-for="p in products" :key="p._id" class="product-item">
                        <strong>{{ p.nom }}</strong> - {{ p.prix }}€
                        <p style="font-size: 0.9em; color: #666;">{{ p.description }}</p>
                    </div>
                </div>
                <p v-else>Chargement des produits...</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        createApp({
            setup() {
                const token = ref(localStorage.getItem('token') || '');
                const error = ref('');
                const products = ref([]);
                const loginData = reactive({
                    email: '',
                    password: ''
                });

                const login = async () => {
                    error.value = '';
                    try {
                        const response = await fetch('/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(loginData)
                        });
                        const data = await response.json();
                        
                        if (response.ok) {
                            token.value = data.token;
                            localStorage.setItem('token', data.token);
                            fetchProducts();
                        } else {
                            error.value = data.message || 'Erreur de connexion';
                        }
                    } catch (err) {
                        error.value = 'Impossible de contacter le serveur';
                    }
                };

                const fetchProducts = async () => {
                    try {
                        const response = await fetch('/products', {
                            headers: { 'Authorization': `Bearer ${token.value}` }
                        });
                        if (response.ok) {
                            products.value = await response.json();
                        } else {
                            if (response.status === 401) logout();
                        }
                    } catch (err) {
                        console.error('Erreur produits:', err);
                    }
                };

                const logout = () => {
                    token.value = '';
                    localStorage.removeItem('token');
                    products.value = [];
                    loginData.password = '';
                };

                // Charger les produits au démarrage si déjà connecté
                if (token.value) fetchProducts();

                return { token, error, products, loginData, login, logout, fetchProducts };
            }
        }).mount('#app');
    </script>
</body>
</html>
